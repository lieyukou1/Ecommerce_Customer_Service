services:
  mysql:
    image: mysql:8.4
    container_name: property-service-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: hzk686868
      MYSQL_DATABASE: property_service_demo
      MYSQL_USER: atguigu
      MYSQL_PASSWORD: Atguigu.123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/initdb:/docker-entrypoint-initdb.d:Z

  backend:
    build: ./ecommerce-service-backend/ecommerce-service-backend
    container_name: property-service-backend
    restart: always
    ports:
      - "18081:18081"
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql+pymysql://atguigu:Atguigu.123@mysql:3306/property_service_demo?charset=utf8mb4
      APP_HOST: 0.0.0.0
      APP_PORT: 18081

volumes:
  mysql_data:
